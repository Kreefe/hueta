name: Build UEFI App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Обновили до v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc make gnu-efi binutils

      - name: Build EFI application
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4 # Обновили до v4
        with:
          name: uefi-petya-app
          path: boot.efi
